# ============================================================================
# GRIMBOTS — Nginx Reverse Proxy + Cloudflare
# ============================================================================
# Instalação: sudo ln -sf /root/grimbots/deploy/nginx/grimbots.conf /etc/nginx/sites-available/grimbots
#             sudo ln -sf /etc/nginx/sites-available/grimbots /etc/nginx/sites-enabled/
#             sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

upstream grimbots_app {
    # Gunicorn escutando em 127.0.0.1:5000 (via gunicorn_config.py)
    server 127.0.0.1:5000;
    keepalive 64;
}

# ============================================================================
# HTTP → HTTPS redirect (Cloudflare faz SSL termination)
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name grimbots.com.br www.grimbots.com.br;

    # Cloudflare: respeitar X-Forwarded-Proto
    if ($http_x_forwarded_proto = 'https') {
        return 301 https://$host$request_uri;
    }

    # Redirecionar HTTP para HTTPS (exceto health check para monitoramento)
    location /health {
        access_log off;
        proxy_pass http://grimbots_app;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================================
# HTTPS server
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grimbots.com.br www.grimbots.com.br;

    # SSL — Cloudflare Flexible (ou Full com certs locais)
    # Se Full: ssl_certificate /etc/letsencrypt/live/grimbots.com.br/fullchain.pem;
    # Se Flexible: não precisa de SSL aqui (Cloudflare termina)

    # ============================================================================
    # ESTÁTICOS — Cache agressivo, fora do Python
    # ============================================================================
    location /static/ {
        alias /root/grimbots/static/;
        expires 7d;
        add_header Cache-Control "public, immutable, max-age=604800";
        access_log off;

        # Gzip para estáticos
        gzip_static on;
        gzip_types text/css application/javascript image/svg+xml application/font-woff2;
    }

    # ============================================================================
    # HEALTH CHECK — Sem cache, sem rate limit
    # ============================================================================
    location /health {
        access_log off;
        proxy_pass http://grimbots_app;
        proxy_http_version 1.1;

        # Timeout curto — health check não deve travar
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ============================================================================
    # API TRACKING COOKIES — Endpoint especial com buffer reduzido
    # ============================================================================
    location /api/tracking/cookies {
        proxy_pass http://grimbots_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Beacon API envia payloads pequenos — buffer mínimo
        proxy_request_buffering off;
        proxy_buffering off;

        # Timeout curto
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # ============================================================================
    # GO REDIRECT — Rate limit por IP no Nginx (defesa extra antes do Flask)
    # ============================================================================
    location /go/ {
        # Limite de taxa por IP no Nginx (600/min = 10/s, burst 20)
        limit_req zone=go_redirect burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://grimbots_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Não cachear redirects
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # Timeout para o pipeline do cloaker
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;

        # Buffer de resposta
        proxy_buffers 8 16k;
        proxy_buffer_size 4k;
    }

    # ============================================================================
    # WEBHOOKS — Payloads grandes (Telegram), sem buffer
    # ============================================================================
    location /webhook/ {
        proxy_pass http://grimbots_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webhooks podem ter payloads grandes — sem buffering
        proxy_request_buffering off;
        client_max_body_size 50m;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # ============================================================================
    # DELIVERY — Páginas de entrega
    # ============================================================================
    location /delivery/ {
        proxy_pass http://grimbots_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ============================================================================
    # SOCKET.IO — WebSocket support
    # ============================================================================
    location /socket.io/ {
        proxy_pass http://grimbots_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================================================
    # DASHBOARD, ADMIN, API, BOTS — Tráfego autenticado
    # ============================================================================
    location / {
        proxy_pass http://grimbots_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;

        # Buffer para páginas HTML
        proxy_buffers 16 32k;
        proxy_buffer_size 4k;
        proxy_busy_buffers_size 64k;

        # Gzip para tráfego HTTP
        gzip on;
        gzip_types text/html text/plain text/css application/json application/javascript;
        gzip_min_length 1000;
        gzip_proxied any;
    }
}

# ============================================================================
# ZONE DE RATE LIMIT (usada no /go/)
# ============================================================================
limit_req_zone $binary_remote_addr zone=go_redirect:10m rate=10r/s;
