# ============================================================================
# GRIMBOTS — Nginx Reverse Proxy + Cloudflare (FASE 3 TUNING)
# ============================================================================
# Instalação: sudo ln -sf /root/grimbots/deploy/nginx/grimbots.conf /etc/nginx/sites-available/grimbots
#             sudo ln -sf /etc/nginx/sites-available/grimbots /etc/nginx/sites-enabled/
#             sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ============================================================================
    # CACHE DE ESTÁTICOS (proxy)
    # ============================================================================
    proxy_cache_path /var/cache/nginx/cache levels=1:2 keys_zone=static:50m max_size=1g inactive=7d;
    proxy_temp_path /var/cache/nginx/temp 1 2;

    # ============================================================================
    # TIMEOUTS GLOBAIS
    # ============================================================================
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    reset_timedout_connection on;
    server_tokens off;

    upstream grimbots_app {
        server 127.0.0.1:5000;
        keepalive 128;
        keepalive_requests 1000;
    }

    # ============================================================================
    # ZONAS DE RATE LIMIT
    # ============================================================================
    limit_req_zone $binary_remote_addr zone=go_redirect:10m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=api_global:20m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=webhook_global:20m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=go_conn:10m;
    limit_conn_zone $binary_remote_addr zone=conn_global:10m;

    # ============================================================================
    # HTTP → HTTPS redirect (Cloudflare faz SSL termination)
    # ============================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name grimbots.com.br www.grimbots.com.br;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        if ($http_x_forwarded_proto = 'https') {
            return 301 https://$host$request_uri;
        }

        location /health {
            access_log off;
            proxy_pass http://grimbots_app;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================================
    # HTTPS server
    # ============================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name grimbots.com.br www.grimbots.com.br;

        # SSL — Cloudflare Flexible (ou Full com certs locais)
        # Se Full: ssl_certificate /etc/letsencrypt/live/grimbots.com.br/fullchain.pem;
        # Se Flexible: não precisa de SSL aqui (Cloudflare termina)

        # ============================================================================
        # SECURITY HEADERS
        # ============================================================================
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ============================================================================
        # ESTÁTICOS — Cache agressivo, fora do Python
        # ============================================================================
        location /static/ {
            alias /root/grimbots/static/;
            expires 7d;
            add_header Cache-Control "public, immutable, max-age=604800";
            access_log off;

            gzip_static on;
            gzip_types text/css application/javascript image/svg+xml application/font-woff2;
        }

        # ============================================================================
        # HEALTH CHECK — Sem cache, sem rate limit
        # ============================================================================
        location /health {
            access_log off;
            proxy_pass http://grimbots_app;
            proxy_http_version 1.1;

            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ============================================================================
        # API TRACKING COOKIES — Endpoint especial com buffer reduzido
        # ============================================================================
        location /api/tracking/cookies {
            limit_req zone=api_global burst=40 nodelay;
            limit_req_status 429;
            limit_conn conn_global 10;

            proxy_pass http://grimbots_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_request_buffering off;
            proxy_buffering off;

            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # ============================================================================
        # GO REDIRECT — Rate limit por IP no Nginx (defesa extra antes do Flask)
        # ============================================================================
        location /go/ {
            limit_req zone=go_redirect burst=200 nodelay;
            limit_req_status 429;
            limit_conn go_conn 5;

            proxy_pass http://grimbots_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_no_cache 1;
            proxy_cache_bypass 1;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;

            proxy_buffers 8 16k;
            proxy_buffer_size 4k;
        }

        # ============================================================================
        # API — Rate limit global + buffer tuning
        # ============================================================================
        location /api/ {
            limit_req zone=api_global burst=40 nodelay;
            limit_req_status 429;
            limit_conn conn_global 10;

            proxy_pass http://grimbots_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;

            proxy_buffers 32 32k;
            proxy_buffer_size 8k;
            proxy_busy_buffers_size 128k;
        }

        # ============================================================================
        # WEBHOOKS — Payloads grandes (Telegram), sem buffer
        # ============================================================================
        location /webhook/ {
            limit_req zone=webhook_global burst=30 nodelay;
            limit_req_status 429;
            limit_conn conn_global 5;

            proxy_pass http://grimbots_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_request_buffering off;
            client_max_body_size 50m;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # ============================================================================
        # DELIVERY — Páginas de entrega
        # ============================================================================
        location /delivery/ {
            proxy_pass http://grimbots_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # ============================================================================
        # SOCKET.IO — WebSocket support
        # ============================================================================
        location /socket.io/ {
            proxy_pass http://grimbots_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ============================================================================
        # DASHBOARD, ADMIN, BOTS — Tráfego autenticado
        # ============================================================================
        location / {
            limit_req zone=api_global burst=50 nodelay;
            limit_req_status 429;
            limit_conn conn_global 20;

            proxy_pass http://grimbots_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;

            proxy_buffers 32 32k;
            proxy_buffer_size 8k;
            proxy_busy_buffers_size 128k;

            gzip on;
            gzip_types text/html text/plain text/css application/json application/javascript;
            gzip_min_length 1000;
            gzip_proxied any;
        }
    }
}
