<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega - Acesso Liberado</title>
    
    {% if pixel_id %}
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');

      // 🔧 FIX 2: Restaurar cookies Meta do servidor
      // O servidor conhece fbp/fbc do BotUser/Redis — restaura os cookies
      // para que fbevents.js leia os valores corretos, mesmo se perdidos
      {% if fbp and fbp != 'None' %}
      (function() {
        var v = '{{ fbp | e }}';
        if (v.length > 0) {
          document.cookie = '_fbp=' + v + '; path=/; max-age=' + (90*24*60*60) + '; SameSite=Lax';
          console.log('[META FIX] _fbp cookie restaurado:', v.substring(0, 30) + '...');
        }
      })();
      {% endif %}
      {% if fbc and fbc != 'None' %}
      (function() {
        var v = '{{ fbc | e }}';
        if (v.length > 0) {
          document.cookie = '_fbc=' + v + '; path=/; max-age=' + (90*24*60*60) + '; SameSite=Lax';
          console.log('[META FIX] _fbc cookie restaurado:', v.substring(0, 50) + '...');
        }
      })();
      {% endif %}

      fbq('init', '{{ pixel_id }}'{% if fbclid_hash %}, {external_id: '{{ fbclid_hash }}'}{% endif %});

      fbq('track', 'PageView');

      const paymentId = '{{ payment.id }}';
      const purchaseKey = 'grimbots_purchase_' + paymentId;

      if (localStorage.getItem(purchaseKey)) {
          console.log('⚠️ [ANTI-DUP] Purchase ' + paymentId + ' já foi enviado.');
      } else {
          localStorage.setItem(purchaseKey, 'true');

          fbq('track', 'Purchase', {
              value: {{ payment.amount }},
              currency: 'BRL',
              content_ids: ['{{ payment.payment_id }}'],
              content_name: '{{ payment.product_name | default("Acesso Premium") | replace("'", "\\'") }}',
              content_type: 'product',
          }, { eventID: '{{ purchase_event_id }}', event_source_url: window.location.href });

          console.log('✅ [META] Purchase disparado.');

          fetch('{{ url_for("delivery.mark_purchase_sent") }}', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ payment_id: paymentId, event_id: '{{ purchase_event_id }}' })
          }).catch(e => console.log('Fetch secundário ignorado.'));
      }
    </script>
    {% endif %}
    
    <style>
        /* MANTIVE SEU CSS ORIGINAL INTACTO */
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin: 0; padding: 20px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .container { max-width: 500px; width: 100%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        .success-icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .product-name { font-size: 20px; font-weight: 600; margin-bottom: 10px; opacity: 0.9; }
        .amount { font-size: 24px; font-weight: 700; margin-bottom: 30px; color: #4ade80; }
        .redirect-button { background: white; color: #667eea; border: none; padding: 16px 32px; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: transform 0.2s, box-shadow 0.2s; margin-top: 20px; }
        .redirect-button:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); }
        .loading { display: none; margin-top: 20px; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Acesso Liberado!</h1>
        <div class="product-name">Seu Acesso Imediato</div>
        
        <div class="amount">R$ {{ payment.amount }}</div>
        
        <a href="{{ redirect_url or '#' }}" id="redirect-link" class="redirect-button">
            Acessar Agora
        </a>
        <div class="loading" id="loading">Redirecionando...</div>
    </div>
    
    <script>
        // --- CONFIGURAÇÃO DE REDIRECIONAMENTO ---
        const REDIRECT_DELAY_MS = 4000; // 4 segundos é suficiente e melhor UX
        const redirectAllowedAt = Date.now() + REDIRECT_DELAY_MS;
        const redirectUrl = '{{ redirect_url | replace("'", "\\'") or "" }}';
        const loadingEl = document.getElementById('loading');
        const linkEl = document.getElementById('redirect-link');

        function safeRedirect() {
            const now = Date.now();
            if (now < redirectAllowedAt) {
                return setTimeout(safeRedirect, redirectAllowedAt - now);
            }
            if (loadingEl) loadingEl.style.display = 'block';
            window.location.href = redirectUrl;
        }

        setTimeout(safeRedirect, REDIRECT_DELAY_MS);

        if (linkEl) {
            linkEl.addEventListener('click', function (e) {
                e.preventDefault();
                safeRedirect();
            });
        }
        
        // --- SISTEMA DE ATRIBUIÇÃO CERTEIRA (MATCHING) ---
        // Já disparado acima (HTML-only). Nada adicional aqui.
    </script>
    
    <!-- Cloudflare RUM removido — injetado automaticamente pelo Cloudflare em produção -->
</body>
</html>
