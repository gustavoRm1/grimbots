{% extends "base.html" %}

{% block title %}Chat - grimbots{% endblock %}

{% block content %}
<div class="max-w-full mx-auto h-screen flex flex-col" style="background: var(--bg-primary);" x-data="chatApp()" x-init="init()">
    <!-- Header -->
    <div class="px-6 py-4 border-b flex items-center justify-between" style="border-color: var(--border-subtle); background: var(--bg-secondary);">
        <div>
            <h1 class="text-2xl font-bold" style="color: var(--txt-primary);">
                <i class="fas fa-comments mr-3" style="color: var(--brand-blue-500);"></i>
                Chat
            </h1>
            <p class="text-sm mt-1" style="color: var(--txt-secondary);">
                Gerencie todas as conversas dos seus bots
            </p>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-sm" style="color: var(--txt-secondary);">
                <span x-text="selectedBot ? selectedBot.name : 'Nenhum bot selecionado'"></span>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Sidebar: Bots -->
        <div class="w-64 border-r overflow-y-auto flex-shrink-0" style="border-color: var(--border-subtle); background: var(--bg-secondary);">
            <div class="p-4">
                <h2 class="text-sm font-semibold mb-3 uppercase" style="color: var(--txt-secondary);">Bots Online</h2>
                <div class="space-y-2">
                    <template x-for="bot in bots" :key="bot.id">
                        <div 
                            @click="selectBot(bot)"
                            class="p-3 rounded-lg cursor-pointer transition-all"
                            :class="selectedBot && selectedBot.id === bot.id ? 'bg-blue-500/20 border-2 border-blue-500' : 'hover:bg-gray-800/50 border border-transparent'"
                            style="background: var(--bg-tertiary);"
                        >
                            <div class="flex items-center justify-between">
                                <div class="flex-1 min-w-0">
                                    <p class="font-semibold text-sm truncate" style="color: var(--txt-primary);" x-text="bot.name"></p>
                                    <p class="text-xs truncate" style="color: var(--txt-secondary);" x-text="'@' + (bot.username || '—')"></p>
                                </div>
                                <div class="flex items-center gap-2 ml-2">
                                    <template x-if="bot.unread_count > 0">
                                        <span class="px-2 py-1 text-xs font-bold rounded-full bg-red-500 text-white" x-text="bot.unread_count"></span>
                                    </template>
                                    <span class="w-2 h-2 rounded-full" :class="bot.is_running ? 'bg-green-500' : 'bg-gray-600'"></span>
                                </div>
                            </div>
                            <div class="mt-2 text-xs" style="color: var(--txt-muted);">
                                <span x-text="bot.total_conversations + ' conversas'"></span>
                            </div>
                        </div>
                    </template>
                    <template x-if="bots.length === 0">
                        <div class="text-center py-8 text-sm" style="color: var(--txt-muted);">
                            <i class="fas fa-robot text-3xl mb-2"></i>
                            <p>Nenhum bot online</p>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Middle: Conversations List -->
        <div class="flex-1 flex flex-col border-r overflow-hidden" style="border-color: var(--border-subtle); background: var(--bg-secondary);" x-show="selectedBot && !selectedConversation">
            <!-- Filters and Search -->
            <div class="p-4 border-b" style="border-color: var(--border-subtle);">
                <!-- Search -->
                <div class="mb-4">
                    <input 
                        type="text" 
                        x-model="searchQuery"
                        @input.debounce.300ms="loadConversations()"
                        placeholder="Buscar por nome ou username..."
                        class="w-full px-4 py-2 rounded-lg text-sm focus:outline-none focus:ring-2 transition-all"
                        style="background: var(--bg-tertiary); border: 1px solid var(--border-subtle); color: var(--txt-primary); focus:ring-color: var(--brand-blue-500);"
                    >
                </div>
                
                <!-- Filter Tabs -->
                <div class="flex gap-2 overflow-x-auto">
                    <button 
                        @click="filterType = 'all'; conversationOffset = 0; loadConversations()"
                        class="px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all"
                        :class="filterType === 'all' ? 'bg-blue-500 text-white' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'"
                    >
                        Todos
                    </button>
                    <button 
                        @click="filterType = 'paid'; conversationOffset = 0; loadConversations()"
                        class="px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all"
                        :class="filterType === 'paid' ? 'bg-green-500 text-white' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'"
                    >
                        <i class="fas fa-check-circle mr-1"></i> Pagou
                    </button>
                    <button 
                        @click="filterType = 'pix_generated'; conversationOffset = 0; loadConversations()"
                        class="px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all"
                        :class="filterType === 'pix_generated' ? 'bg-yellow-500 text-white' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'"
                    >
                        <i class="fas fa-qrcode mr-1"></i> Gerou PIX
                    </button>
                    <button 
                        @click="filterType = 'only_entered'; conversationOffset = 0; loadConversations()"
                        class="px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all"
                        :class="filterType === 'only_entered' ? 'bg-gray-500 text-white' : 'bg-gray-800 text-gray-300 hover:bg-gray-700'"
                    >
                        <i class="fas fa-user mr-1"></i> Só Entrou
                    </button>
                </div>
            </div>

            <!-- Conversations List -->
            <div class="flex-1 overflow-y-auto">
                <template x-if="loading">
                    <div class="flex items-center justify-center h-full">
                        <i class="fas fa-spinner fa-spin text-2xl" style="color: var(--txt-secondary);"></i>
                    </div>
                </template>
                <template x-if="!loading && conversations.length === 0">
                    <div class="text-center py-12 text-sm" style="color: var(--txt-muted);">
                        <i class="fas fa-comments text-4xl mb-3"></i>
                        <p>Nenhuma conversa encontrada</p>
                    </div>
                </template>
                <template x-if="!loading && conversations.length > 0">
                    <div class="divide-y" style="border-color: var(--border-subtle);">
                        <template x-for="conv in conversations" :key="conv.telegram_user_id">
                            <div 
                                @click="selectConversation(conv)"
                                class="p-4 cursor-pointer hover:bg-gray-800/50 transition-all"
                            >
                                <div class="flex items-start gap-3">
                                    <!-- Avatar -->
                                    <div class="w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0" 
                                         :style="`background: ${getStatusColor(conv.status)};`">
                                        <i class="fas fa-user text-white"></i>
                                    </div>
                                    
                                    <!-- Info -->
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center justify-between mb-1">
                                            <p class="font-semibold text-sm truncate" style="color: var(--txt-primary);" x-text="conv.first_name"></p>
                                            <span class="text-xs ml-2 whitespace-nowrap" style="color: var(--txt-muted);" x-text="formatTime(conv.last_interaction)"></span>
                                        </div>
                                        
                                        <div class="flex items-center gap-2 mb-1">
                                            <p class="text-sm truncate flex-1" style="color: var(--txt-secondary);" x-text="conv.last_message ? conv.last_message.text : 'Sem mensagens'"></p>
                                            <template x-if="conv.unread_count > 0">
                                                <span class="px-2 py-0.5 text-xs font-bold rounded-full bg-blue-500 text-white" x-text="conv.unread_count"></span>
                                            </template>
                                        </div>
                                        
                                        <!-- Status Badges -->
                                        <div class="flex items-center gap-2 mt-1">
                                            <template x-if="conv.has_paid">
                                                <span class="px-2 py-0.5 text-xs font-semibold rounded bg-green-500/20 text-green-400">
                                                    <i class="fas fa-check-circle mr-1"></i> Pagou
                                                </span>
                                            </template>
                                            <template x-if="conv.has_pix && !conv.has_paid">
                                                <span class="px-2 py-0.5 text-xs font-semibold rounded bg-yellow-500/20 text-yellow-400">
                                                    <i class="fas fa-qrcode mr-1"></i> PIX Gerado
                                                </span>
                                            </template>
                                            <template x-if="conv.total_spent > 0">
                                                <span class="px-2 py-0.5 text-xs font-semibold rounded" style="background: rgba(59, 130, 246, 0.2); color: #60A5FA;">
                                                    <i class="fas fa-dollar-sign mr-1"></i> R$ <span x-text="formatMoney(conv.total_spent)"></span>
                                                </span>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                    <!-- Carregar mais -->
                    <template x-if="hasMore && !loading">
                        <div class="p-4 text-center">
                            <button 
                                @click="loadMoreConversations()"
                                :disabled="loadingMore"
                                class="px-6 py-2 rounded-lg text-sm font-semibold transition-all"
                                style="background: var(--bg-tertiary); border: 1px solid var(--border-subtle); color: var(--txt-primary);"
                            >
                                <template x-if="!loadingMore">
                                    <span><i class="fas fa-chevron-down mr-2"></i>Carregar mais</span>
                                </template>
                                <template x-if="loadingMore">
                                    <span><i class="fas fa-spinner fa-spin mr-2"></i>Carregando...</span>
                                </template>
                            </button>
                        </div>
                    </template>
                </template>
            </div>
        </div>

        <!-- Right: Messages -->
        <div class="flex-1 flex flex-col overflow-hidden" style="background: var(--bg-secondary);" x-show="selectedConversation">
            <!-- Conversation Header -->
            <div class="p-4 border-b flex items-center justify-between" style="border-color: var(--border-subtle);">
                <div class="flex items-center gap-3">
                    <button 
                        @click="selectedConversation = null" 
                        class="p-2 rounded-lg transition-all hover:bg-gray-800/50 flex items-center justify-center"
                        style="background: var(--bg-tertiary); border: 1px solid var(--border-subtle);"
                        title="Voltar para lista de conversas"
                    >
                        <i class="fas fa-arrow-left" style="color: var(--txt-primary);"></i>
                    </button>
                    <div class="w-10 h-10 rounded-full flex items-center justify-center" 
                         :style="`background: ${getStatusColor(selectedConversation?.status || 'only_entered')};`">
                        <i class="fas fa-user text-white"></i>
                    </div>
                    <div>
                        <p class="font-semibold" style="color: var(--txt-primary);" x-text="selectedConversation?.first_name || 'Sem nome'"></p>
                        <p class="text-xs" style="color: var(--txt-secondary);" x-text="'@' + (selectedConversation?.username || '—')"></p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button @click="showProfile = !showProfile; if(showProfile) loadCustomerProfile()"
                            class="p-2 rounded-lg transition-all border"
                            :class="showProfile ? 'bg-blue-500/20 text-blue-400 border-blue-500' : 'hover:bg-gray-800/50'"
                            style="border-color: var(--border-subtle);"
                            title="Perfil do cliente">
                        <i class="fas fa-user-circle"></i>
                    </button>
                    <template x-if="selectedConversation?.has_paid">
                        <span class="px-2 py-1 text-xs font-semibold rounded bg-green-500/20 text-green-400">
                            <i class="fas fa-check-circle mr-1"></i> Cliente Pago
                        </span>
                    </template>
                </div>
            </div>

            <!-- Messages + Profile Container -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Messages Area -->
                <div class="flex-1 overflow-y-auto p-4 space-y-4" id="messages-container" x-ref="messagesContainer">
                    <template x-if="loadingMessages">
                        <div class="flex items-center justify-center h-full">
                            <i class="fas fa-spinner fa-spin text-2xl" style="color: var(--txt-secondary);"></i>
                        </div>
                    </template>
                    <template x-if="!loadingMessages && messages.length === 0">
                        <div class="text-center py-12 text-sm" style="color: var(--txt-muted);">
                            <i class="fas fa-comment-slash text-4xl mb-3"></i>
                            <p>Nenhuma mensagem ainda</p>
                            <p class="text-xs mt-2">Comece a conversar enviando uma mensagem abaixo</p>
                        </div>
                    </template>
                    <template x-if="!loadingMessages && messages.length > 0">
                        <div>
                            <template x-if="hasMoreMessages">
                                <div class="text-center py-3">
                                    <button 
                                        @click="loadMoreMessages()"
                                        :disabled="loadingMoreMessages"
                                        class="px-5 py-2 rounded-lg text-sm font-semibold transition-all hover:opacity-80"
                                        style="background: var(--bg-tertiary); border: 1px solid var(--border-subtle); color: var(--txt-primary);"
                                    >
                                        <template x-if="!loadingMoreMessages">
                                            <span><i class="fas fa-chevron-up mr-2"></i>Carregar mensagens anteriores</span>
                                        </template>
                                        <template x-if="loadingMoreMessages">
                                            <span><i class="fas fa-spinner fa-spin mr-2"></i>Carregando...</span>
                                        </template>
                                    </button>
                                </div>
                            </template>
                        <template x-for="msg in messages" :key="msg.id">
                            <div class="flex items-start gap-3" :class="msg.direction === 'outgoing' ? 'justify-end' : ''">
                                <template x-if="msg.direction === 'incoming'">
                                    <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" 
                                         :style="`background: ${getStatusColor(selectedConversation?.status || 'only_entered')};`">
                                        <i class="fas fa-user text-white text-xs"></i>
                                    </div>
                                </template>
                                <div class="max-w-[70%]" :class="msg.direction === 'outgoing' ? 'flex flex-col items-end' : ''">
                                    <div class="rounded-2xl px-4 py-3"
                                     :style="msg.direction === 'outgoing' ? 'background: linear-gradient(135deg, var(--brand-blue-500), var(--brand-blue-600)); color: white;' : 'background: var(--bg-tertiary); border: 1px solid var(--border-subtle); color: var(--txt-primary);'">
                                    <!-- Mídia (foto/vídeo/documento) -->
                                    <template x-if="msg.media_url && (msg.message_type === 'photo' || msg.message_type === 'video' || msg.message_type === 'document')">
                                        <div class="mb-2">
                                            <template x-if="msg.message_type === 'photo'">
                                                <img 
                                                    :src="`/api/chat/media/${selectedBot.id}/${msg.media_url}`" 
                                                    :alt="msg.message_text || 'Foto'"
                                                    class="rounded-lg max-w-full max-h-64 object-cover cursor-pointer"
                                                    @click="window.open(`/api/chat/media/${selectedBot.id}/${msg.media_url}`, '_blank')"
                                                    onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
                                                >
                                                <div style="display: none;" class="text-xs opacity-75">[Foto não disponível]</div>
                                            </template>
                                            <template x-if="msg.message_type === 'video'">
                                                <video 
                                                    :src="`/api/chat/media/${selectedBot.id}/${msg.media_url}`" 
                                                    controls
                                                    class="rounded-lg max-w-full max-h-64"
                                                    preload="metadata"
                                                >
                                                    Seu navegador não suporta vídeo.
                                                </video>
                                            </template>
                                            <template x-if="msg.message_type === 'document'">
                                                <a 
                                                    :href="`/api/chat/media/${selectedBot.id}/${msg.media_url}`" 
                                                    target="_blank"
                                                    class="flex items-center gap-2 p-3 rounded-lg bg-gray-700/50 hover:bg-gray-700 transition-colors text-sm"
                                                >
                                                    <i class="fas fa-file text-blue-400"></i>
                                                    <span x-text="msg.message_text || 'Documento'"></span>
                                                    <i class="fas fa-external-link-alt text-xs ml-auto opacity-50"></i>
                                                </a>
                                            </template>
                                            <template x-if="msg.message_type === 'audio'">
                                                <audio 
                                                    :src="`/api/chat/media/${selectedBot.id}/${msg.media_url}`" 
                                                    controls
                                                    class="rounded-lg max-w-full"
                                                    preload="metadata"
                                                    style="height: 40px;"
                                                >
                                                    Seu navegador não suporta áudio.
                                                </audio>
                                            </template>
                                        </div>
                                    </template>
                                    <!-- Texto da mensagem -->
                                    <template x-if="msg.message_text">
                                        <p class="text-sm" x-text="msg.message_text"></p>
                                    </template>
                                    <template x-if="!msg.message_text && !msg.media_url">
                                        <p class="text-sm opacity-75">[Mídia]</p>
                                    </template>
                                </div>
                                <p class="text-xs mt-1" :class="msg.direction === 'outgoing' ? 'text-right mr-2' : 'ml-2'" style="color: var(--txt-muted);" x-text="formatTime(msg.created_at)"></p>
                            </div>
                            <template x-if="msg.direction === 'outgoing'">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: linear-gradient(135deg, var(--brand-blue-500), var(--brand-blue-600));">
                                    <i class="fas fa-robot text-white text-xs"></i>
                                </div>
                            </template>
                        </div>
                    </template>
                    </div>
                </template>
            </div>

            <!-- Profile Panel -->
            <template x-if="showProfile">
                <div class="h-full overflow-y-auto p-4 space-y-4 border-l" style="background: var(--bg-primary); width: 380px; flex-shrink: 0; border-color: var(--border-subtle);">
                    <template x-if="loadingProfile">
                        <div class="flex items-center justify-center h-32">
                            <i class="fas fa-spinner fa-spin text-xl" style="color: var(--txt-secondary);"></i>
                        </div>
                    </template>
                    <template x-if="!loadingProfile && customerProfile">
                        <div>
                            <div class="rounded-lg p-3" style="background: var(--bg-tertiary);">
                                <h4 class="text-sm font-semibold mb-2" style="color: var(--txt-primary);">Identificação</h4>
                                <div class="space-y-1 text-xs" style="color: var(--txt-secondary);">
                                    <div><span class="opacity-50">Nome:</span> <span x-text="customerProfile.basic.first_name || '-'"></span></div>
                                    <div><span class="opacity-50">Username:</span> <span x-text="'@' + (customerProfile.basic.username || '—')"></span></div>
                                    <div><span class="opacity-50">Telegram ID:</span> <span x-text="customerProfile.basic.telegram_user_id"></span></div>
                                </div>
                            </div>

                            <div class="rounded-lg p-3" style="background: var(--bg-tertiary);">
                                <h4 class="text-sm font-semibold mb-2" style="color: var(--txt-primary);">Tracking</h4>
                                <div class="space-y-1 text-xs" style="color: var(--txt-secondary);">
                                    <div><span class="opacity-50">Pixel:</span> <span x-text="customerProfile.tracking.campaign_code || '-'"></span></div>
                                    <div><span class="opacity-50">fbclid:</span> <span class="block truncate" x-text="customerProfile.tracking.fbclid || '-'"></span></div>
                                    <div><span class="opacity-50">fbp:</span> <span class="block truncate" x-text="customerProfile.tracking.fbp || '-'"></span></div>
                                    <div><span class="opacity-50">fbc:</span> <span class="block truncate" x-text="customerProfile.tracking.fbc || '-'"></span></div>
                                    <div><span class="opacity-50">UTM Source:</span> <span x-text="customerProfile.tracking.utm_source || '-'"></span></div>
                                    <div><span class="opacity-50">UTM Medium:</span> <span x-text="customerProfile.tracking.utm_medium || '-'"></span></div>
                                    <div><span class="opacity-50">UTM Campaign:</span> <span x-text="customerProfile.tracking.utm_campaign || '-'"></span></div>
                                    <div><span class="opacity-50">UTM Content:</span> <span x-text="customerProfile.tracking.utm_content || '-'"></span></div>
                                    <div><span class="opacity-50">UTM Term:</span> <span x-text="customerProfile.tracking.utm_term || '-'"></span></div>
                                    <div><span class="opacity-50">Session ID:</span> <span class="block truncate" x-text="customerProfile.tracking.tracking_session_id || '-'"></span></div>
                                    <div><span class="opacity-50">External ID:</span> <span class="block truncate" x-text="customerProfile.tracking.external_id || '-'"></span></div>
                                    <div><span class="opacity-50">Click URL:</span> <span class="block truncate" x-text="customerProfile.tracking.click_context_url || '-'"></span></div>
                                    <div><span class="opacity-50">Click em:</span> <span x-text="customerProfile.tracking.click_timestamp ? formatDate(customerProfile.tracking.click_timestamp) : '-'"></span></div>
                                </div>
                            </div>

                            <div class="rounded-lg p-3" style="background: var(--bg-tertiary);">
                                <h4 class="text-sm font-semibold mb-2" style="color: var(--txt-primary);">Dispositivo</h4>
                                <div class="space-y-1 text-xs" style="color: var(--txt-secondary);">
                                    <div><span class="opacity-50">IP:</span> <span x-text="customerProfile.device.ip_address || '-'"></span></div>
                                    <div><span class="opacity-50">Device:</span> <span x-text="customerProfile.device.device_type || '-'"></span></div>
                                    <div><span class="opacity-50">OS:</span> <span x-text="customerProfile.device.os_type || '-'"></span></div>
                                    <div><span class="opacity-50">Browser:</span> <span x-text="customerProfile.device.browser || '-'"></span></div>
                                    <div><span class="opacity-50">Modelo:</span> <span x-text="customerProfile.device.device_model || '-'"></span></div>
                                    <div><span class="opacity-50">User Agent:</span> <span class="block truncate" x-text="customerProfile.device.user_agent || '-'"></span></div>
                                </div>
                            </div>

                            <div class="rounded-lg p-3" style="background: var(--bg-tertiary);">
                                <h4 class="text-sm font-semibold mb-2" style="color: var(--txt-primary);">Demográfico</h4>
                                <div class="space-y-1 text-xs" style="color: var(--txt-secondary);">
                                    <div><span class="opacity-50">Cidade:</span> <span x-text="customerProfile.demographic.customer_city || '-'"></span></div>
                                    <div><span class="opacity-50">Estado:</span> <span x-text="customerProfile.demographic.customer_state || '-'"></span></div>
                                    <div><span class="opacity-50">País:</span> <span x-text="customerProfile.demographic.customer_country || '-'"></span></div>
                                    <div><span class="opacity-50">Idade:</span> <span x-text="customerProfile.demographic.customer_age || '-'"></span></div>
                                    <div><span class="opacity-50">Gênero:</span> <span x-text="customerProfile.demographic.customer_gender || '-'"></span></div>
                                </div>
                            </div>

                            <div class="rounded-lg p-3" style="background: var(--bg-tertiary);">
                                <h4 class="text-sm font-semibold mb-2" style="color: var(--txt-primary);">Atividade</h4>
                                <div class="space-y-1 text-xs" style="color: var(--txt-secondary);">
                                    <div><span class="opacity-50">Primeira interação:</span> <span x-text="customerProfile.activity.first_interaction ? formatDate(customerProfile.activity.first_interaction) : '-'"></span></div>
                                    <div><span class="opacity-50">Última interação:</span> <span x-text="customerProfile.activity.last_interaction ? formatDate(customerProfile.activity.last_interaction) : '-'"></span></div>
                                    <div><span class="opacity-50">Welcome sent:</span> <span x-text="customerProfile.activity.welcome_sent ? 'Sim' : 'Não'"></span></div>
                                    <div><span class="opacity-50">PageView sent:</span> <span x-text="customerProfile.activity.meta_pageview_sent ? 'Sim' : 'Não'"></span></div>
                                </div>
                            </div>

                            <div class="rounded-lg p-3" style="background: var(--bg-tertiary);">
                                <h4 class="text-sm font-semibold mb-2" style="color: var(--txt-primary);">Pool de Origem</h4>
                                <template x-if="customerProfile.pool">
                                    <div class="space-y-1 text-xs" style="color: var(--txt-secondary);">
                                        <div><span class="opacity-50">Pool:</span> <span x-text="customerProfile.pool.name"></span></div>
                                        <div><span class="opacity-50">Pixel ID:</span> <span x-text="customerProfile.pool.meta_pixel_id"></span></div>
                                    </div>
                                </template>
                                <template x-if="!customerProfile.pool">
                                    <p class="text-xs opacity-50">Sem pool associado</p>
                                </template>
                            </div>

                            <div class="rounded-lg p-3" style="background: var(--bg-tertiary);">
                                <h4 class="text-sm font-semibold mb-2" style="color: var(--txt-primary);">Pagamentos</h4>
                                <template x-if="customerProfile.payments.length === 0">
                                    <p class="text-xs opacity-50">Nenhum pagamento</p>
                                </template>
                                <template x-for="p in customerProfile.payments" :key="p.id">
                                    <div class="border-b py-2 text-xs" style="border-color: var(--border-subtle); color: var(--txt-secondary);">
                                        <div class="flex justify-between">
                                            <span x-text="formatDate(p.created_at)"></span>
                                            <span class="font-semibold" style="color: var(--txt-primary);" x-text="'R$ ' + formatMoney(p.amount)"></span>
                                        </div>
                                        <div class="flex justify-between">
                                            <span x-text="p.gateway_type || '-'"></span>
                                            <span :class="p.status === 'paid' ? 'text-green-400' : 'text-yellow-400'" x-text="p.status"></span>
                                        </div>
                                        <div class="opacity-50">
                                            <span x-text="p.product_name || '-'"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
            </div>

            <!-- Input Area -->
            <div class="p-4 border-t" style="border-color: var(--border-subtle);">
                <!-- Preview de arquivo selecionado -->
                <template x-if="selectedFile">
                    <div class="mb-3 p-3 rounded-lg flex items-center justify-between" style="background: var(--bg-tertiary); border: 1px solid var(--border-subtle);">
                        <div class="flex items-center gap-3 flex-1">
                            <template x-if="selectedFile.type.startsWith('image/')">
                                <img :src="filePreview" class="w-16 h-16 rounded object-cover" alt="Preview">
                            </template>
                            <template x-if="selectedFile.type.startsWith('video/')">
                                <div class="w-16 h-16 rounded flex items-center justify-center" style="background: var(--bg-primary);">
                                    <i class="fas fa-video text-2xl" style="color: var(--txt-primary);"></i>
                                </div>
                            </template>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium truncate" style="color: var(--txt-primary);" x-text="selectedFile.name"></p>
                                <p class="text-xs" style="color: var(--txt-secondary);" x-text="formatFileSize(selectedFile.size)"></p>
                            </div>
                        </div>
                        <button 
                            @click="selectedFile = null; filePreview = null; fileInput = null"
                            class="ml-2 p-2 rounded-lg hover:bg-gray-700 transition-all"
                            style="color: var(--txt-secondary);"
                        >
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </template>
                
                <form @submit.prevent="selectedFile ? sendMedia() : sendMessage()" class="flex items-center gap-3">
                    <!-- Botão de anexar arquivo -->
                    <label 
                        :class="{'opacity-50 cursor-not-allowed': sendingMessage || !selectedConversation}"
                        class="p-3 rounded-xl cursor-pointer transition-all hover:opacity-80"
                        style="background: var(--bg-tertiary); border: 1px solid var(--border-subtle); color: var(--txt-primary);"
                        title="Enviar foto ou vídeo"
                    >
                        <input 
                            type="file" 
                            accept="image/*,video/*"
                            @change="handleFileSelect($event)"
                            :disabled="sendingMessage || !selectedConversation"
                            class="hidden"
                            x-ref="fileInput"
                        >
                        <i class="fas fa-paperclip"></i>
                    </label>
                    
                    <input 
                        type="text" 
                        x-model="messageInput"
                        :disabled="sendingMessage || !selectedConversation"
                        :placeholder="selectedFile ? 'Adicione uma legenda (opcional)...' : 'Digite sua mensagem...'"
                        class="flex-1 px-4 py-3 rounded-xl text-sm focus:outline-none focus:ring-2 transition-all"
                        style="background: var(--bg-tertiary); border: 1px solid var(--border-subtle); color: var(--txt-primary); focus:ring-color: var(--brand-blue-500);"
                        autocomplete="off"
                    >
                    <button 
                        type="submit"
                        :disabled="sendingMessage || !selectedConversation || (!messageInput.trim() && !selectedFile)"
                        class="px-6 py-3 rounded-xl font-semibold text-sm transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                        style="background: linear-gradient(135deg, var(--brand-blue-500), var(--brand-blue-600)); color: white;"
                    >
                        <template x-if="sendingMessage">
                            <i class="fas fa-spinner fa-spin"></i>
                        </template>
                        <template x-if="!sendingMessage">
                            <i class="fas fa-paper-plane mr-2"></i>
                            Enviar
                        </template>
                    </button>
                </form>
            </div>
        </div>

        <!-- Empty State -->
        <div x-show="!selectedBot" class="flex-1 flex items-center justify-center">
            <div class="text-center">
                <i class="fas fa-robot text-6xl mb-4" style="color: var(--txt-muted);"></i>
                <p class="text-lg font-semibold mb-2" style="color: var(--txt-primary);">Selecione um bot para começar</p>
                <p class="text-sm" style="color: var(--txt-secondary);">Escolha um bot online para ver suas conversas</p>
            </div>
        </div>
    </div>
</div>

{% block extra_scripts %}
<script>
function chatApp() {
    return {
        bots: {{ bots | tojson }},
        selectedBot: null,
        selectedConversation: null,
        conversations: [],
        messages: [],
        filterType: 'all',
        searchQuery: '',
        loading: false,
        loadingMore: false,
        hasMore: false,
        loadingMessages: false,
        messageInput: '',
        sendingMessage: false,
        pollingInterval: null,
        selectedFile: null,
        filePreview: null,
        fileInput: null,
        conversationOffset: 0,
        conversationLimit: 50,
        messageOffset: 0,
        messageLimit: 50,
        hasMoreMessages: false,
        loadingMoreMessages: false,
        showProfile: false,
        customerProfile: null,
        loadingProfile: false,

        init() {
            if (this.bots.length > 0) {
                this.selectBot(this.bots[0]);
            }
            
            // ✅ ATUALIZAÇÃO AUTOMÁTICA: Polling para novas mensagens
            this.startMessagePolling();
        },
        
        startMessagePolling() {
            // Limpar intervalo anterior se existir
            if (this.pollingInterval) {
                clearInterval(this.pollingInterval);
                this.pollingInterval = null;
            }
            
            // ✅ DEBUG: Log quando polling é iniciado
            if (this.selectedConversation) {
                console.log('🔄 Polling iniciado para conversa:', this.selectedConversation.telegram_user_id);
            }
            
            // Polling a cada 3 segundos (pausa se aba em background)
            const poll = () => {
                if (document.hidden) return;
                if (this.selectedConversation && this.selectedBot && !this.loadingMessages && !this.sendingMessage) {
                    this.checkNewMessages();
                }
            };
            this.pollingInterval = setInterval(poll, 8000);
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && this.selectedConversation) {
                    this.checkNewMessages();
                }
            });
        },
        
        stopMessagePolling() {
            if (this.pollingInterval) {
                clearInterval(this.pollingInterval);
                this.pollingInterval = null;
            }
        },
        
        async checkNewMessages() {
            if (!this.selectedConversation || !this.selectedBot || this.loadingMessages) {
                // Debug: verificar por que não está executando
                if (!this.selectedConversation) console.debug('🔍 Polling: selectedConversation não definido');
                if (!this.selectedBot) console.debug('🔍 Polling: selectedBot não definido');
                if (this.loadingMessages) console.debug('🔍 Polling: loadingMessages = true');
                return;
            }
            
            try {
                // ✅ CORREÇÃO QI 600+: Usar timestamp ao invés de ID (mais confiável)
                const lastMessage = this.messages.length > 0 ? this.messages[this.messages.length - 1] : null;
                let sinceTimestamp = null;
                
                if (lastMessage && lastMessage.created_at) {
                    // Garantir que o timestamp está no formato correto
                    const timestamp = new Date(lastMessage.created_at);
                    if (!isNaN(timestamp.getTime())) {
                        // ✅ CRÍTICO: Subtrair 5 segundos para garantir que não perca mensagens (margem maior)
                        timestamp.setSeconds(timestamp.getSeconds() - 5);
                        sinceTimestamp = timestamp.toISOString();
                    }
                }
                
                // Construir URL com timestamp
                let url = `/api/chat/messages/${this.selectedBot.id}/${this.selectedConversation.telegram_user_id}`;
                if (sinceTimestamp) {
                    url += `?since_timestamp=${encodeURIComponent(sinceTimestamp)}`;
                }
                
                // ✅ DEBUG: Log da requisição (apenas em dev)
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    console.debug(`🔄 Polling: Buscando mensagens desde ${sinceTimestamp || 'início'}`);
                }
                
                const response = await fetch(url, {
                    cache: 'no-store',  // ✅ CRÍTICO: Evitar cache do navegador
                    headers: {
                        'Cache-Control': 'no-cache'
                    }
                });
                
                if (!response.ok) {
                    console.error(`❌ Erro HTTP no polling: ${response.status} ${response.statusText}`);
                    return;
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    console.error('❌ Erro na resposta do polling:', data.error || 'Erro desconhecido');
                    return;
                }
                
                if (data.messages && data.messages.length > 0) {
                    // Filtrar mensagens duplicadas (comparar por ID para evitar duplicação)
                    const existingIds = new Set(this.messages.map(m => m.id));
                    const newMessages = data.messages.filter(msg => !existingIds.has(msg.id));
                    
                    if (newMessages.length > 0) {
                        this.messages.push(...newMessages);                        
                        this.scrollToBottom();
                    }
                } else {
                    // ✅ DEBUG: Log quando não há mensagens (apenas em dev)
                    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                        console.debug(`🔍 Polling: Nenhuma mensagem nova (total: ${this.messages.length})`);
                    }
                }
            } catch (error) {
                // Log de erro para debug (não interrompe UX)
                console.error('❌ Erro no polling de mensagens:', error);
            }
        },

        selectBot(bot) {
            this.selectedBot = bot;
            this.selectedConversation = null;
            this.conversations = [];
            this.messages = [];
            this.messageOffset = 0;
            this.hasMoreMessages = false;
            this.loadConversations();
        },

        async loadConversations(append = false) {
            if (!this.selectedBot) return;
            
            if (append) {
                this.loadingMore = true;
            } else {
                this.loading = true;
                this.conversationOffset = 0;
            }
            
            try {
                const params = new URLSearchParams({
                    filter: this.filterType,
                    search: this.searchQuery,
                    offset: this.conversationOffset,
                    limit: this.conversationLimit
                });
                
                const response = await fetch(`/api/chat/conversations/${this.selectedBot.id}?${params}`);
                const data = await response.json();
                
                if (data.success) {
                    if (append) {
                        this.conversations.push(...data.conversations);
                    } else {
                        this.conversations = data.conversations;
                    }
                    this.hasMore = data.has_more || false;
                }
            } catch (error) {
                console.error('Erro ao carregar conversas:', error);
            } finally {
                this.loading = false;
                this.loadingMore = false;
            }
        },

        async loadMoreConversations() {
            if (!this.hasMore || this.loadingMore) return;
            this.conversationOffset = this.conversations.length;
            await this.loadConversations(true);
        },

        async selectConversation(conv) {
            this.selectedConversation = conv;
            this.showProfile = false;
            this.customerProfile = null;
            this.loadingMessages = true;
            this.messages = [];
            this.messageOffset = 0;
            this.hasMoreMessages = false;
            
            // Parar polling anterior antes de carregar nova conversa
            this.stopMessagePolling();
            
            try {
                const response = await fetch(`/api/chat/messages/${this.selectedBot.id}/${conv.telegram_user_id}?offset=0&limit=${this.messageLimit}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    this.messages = data.messages || [];
                    this.hasMoreMessages = data.has_more || false;
                    this.scrollToBottom();
                    
                    // Marcar badge do sidebar como lido no frontend
                    if (this.selectedBot) {
                        this.selectedBot.unread_count = 0;
                    }
                    conv.unread_count = 0;
                    
                    // ✅ CRÍTICO: Reiniciar polling APÓS carregar mensagens
                    this.startMessagePolling();
                } else {
                    console.error('Erro ao carregar mensagens:', data.error || 'Erro desconhecido');
                }
            } catch (error) {
                console.error('Erro ao carregar mensagens:', error);
            } finally {
                this.loadingMessages = false;
            }
        },
        
        async loadMoreMessages() {
            if (!this.hasMoreMessages || this.loadingMoreMessages) return;
            
            this.loadingMoreMessages = true;
            this.messageOffset = this.messages.length;
            
            try {
                const response = await fetch(`/api/chat/messages/${this.selectedBot.id}/${this.selectedConversation.telegram_user_id}?offset=${this.messageOffset}&limit=${this.messageLimit}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success && data.messages) {
                    this.messages = [...data.messages, ...this.messages];
                    this.hasMoreMessages = data.has_more || false;
                } else {
                    console.error('Erro ao carregar mais mensagens:', data.error || 'Erro desconhecido');
                }
            } catch (error) {
                console.error('Erro ao carregar mais mensagens:', error);
            } finally {
                this.loadingMoreMessages = false;
            }
        },

        async sendMessage() {
            if (!this.selectedConversation || !this.messageInput.trim() || this.sendingMessage) return;
            
            const messageText = this.messageInput.trim();
            this.messageInput = '';
            this.sendingMessage = true;
            
            try {
                const response = await fetch(`/api/chat/send-message/${this.selectedBot.id}/${this.selectedConversation.telegram_user_id}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: messageText })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const sentAt = new Date().toISOString();
                    this.messages.push({
                        id: data.message_id,
                        message_text: messageText,
                        direction: 'outgoing',
                        created_at: sentAt,
                        is_read: true
                    });

                    // Atualizar último preview na lista de conversas (sem reload)
                    const conv = this.conversations.find(c => c.telegram_user_id === this.selectedConversation.telegram_user_id);
                    if (conv) {
                        conv.last_message = {
                            text: messageText.length > 50 ? messageText.substring(0, 50) + '...' : messageText,
                            created_at: sentAt,
                            direction: 'outgoing'
                        };
                        conv.last_interaction = sentAt;
                    }
                    
                    this.scrollToBottom();
                    
                    // ✅ CRÍTICO: Verificar novas mensagens após enviar (capturar referência no envio, não no fire)
                    const convAtSend = this.selectedConversation;
                    const botAtSend = this.selectedBot;
                    setTimeout(() => {
                        if (convAtSend === this.selectedConversation && botAtSend === this.selectedBot) {
                            this.checkNewMessages();
                        }
                    }, 500); // Aguardar 500ms para dar tempo da mensagem ser salva no banco
                } else {
                    alert('Erro ao enviar mensagem: ' + (data.error || 'Erro desconhecido'));
                    this.messageInput = messageText; // Restaurar mensagem
                }
            } catch (error) {
                console.error('Erro ao enviar mensagem:', error);
                alert('Erro ao enviar mensagem. Tente novamente.');
                this.messageInput = messageText; // Restaurar mensagem
            } finally {
                this.sendingMessage = false;
            }
        },

        scrollToBottom() {
            this.$nextTick(() => {
                const container = this.$refs.messagesContainer;
                if (container) {
                    container.scrollTop = container.scrollHeight;
                }
            });
        },

        getStatusColor(status) {
            const colors = {
                'paid': 'linear-gradient(135deg, #10B981, #059669)',
                'pix_generated': 'linear-gradient(135deg, #F59E0B, #D97706)',
                'only_entered': 'linear-gradient(135deg, #6B7280, #4B5563)'
            };
            return colors[status] || colors['only_entered'];
        },

        formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Agora';
            
            const dia = date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            const hora = date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            
            if (diff < 86400000) return `Hoje ${hora}`;
            if (diff < 172800000) return `Ontem ${hora}`;
            
            const ano = date.getFullYear();
            const anoAtual = now.getFullYear();
            if (ano !== anoAtual) {
                return `${dia}/${ano.toString().slice(-2)} ${hora}`;
            }
            return `${dia} ${hora}`;
        },

        formatMoney(value) {
            return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
        },

        handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Validar tamanho
            const maxSize = file.type.startsWith('video/') ? 50 * 1024 * 1024 : 10 * 1024 * 1024;
            if (file.size > maxSize) {
                alert(`Arquivo muito grande. Máximo: ${maxSize / (1024 * 1024)}MB`);
                event.target.value = '';
                return;
            }
            
            this.selectedFile = file;
            this.fileInput = event.target;
            
            // Criar preview para imagens
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.filePreview = e.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                this.filePreview = null;
            }
        },

        async sendMedia() {
            if (!this.selectedConversation || !this.selectedFile || this.sendingMessage) return;
            
            const caption = this.messageInput.trim() || '';
            this.sendingMessage = true;
            
            try {
                const formData = new FormData();
                formData.append('file', this.selectedFile);
                if (caption) {
                    formData.append('message', caption);
                }
                
                const response = await fetch(`/api/chat/send-media/${this.selectedBot.id}/${this.selectedConversation.telegram_user_id}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Limpar formulário
                    this.selectedFile = null;
                    this.filePreview = null;
                    this.messageInput = '';
                    if (this.fileInput) {
                        this.fileInput.value = '';
                        this.fileInput = null;
                    }
                    
                    // Recarregar mensagens para exibir a nova mídia
                    await this.selectConversation(this.selectedConversation);
                    
                    // Scroll para última mensagem
                    this.scrollToBottom();
                    
                    // Verificar novas mensagens após enviar (capturar referência no envio, não no fire)
                    const convAtSendMedia = this.selectedConversation;
                    const botAtSendMedia = this.selectedBot;
                    setTimeout(() => {
                        if (convAtSendMedia === this.selectedConversation && botAtSendMedia === this.selectedBot) {
                            this.checkNewMessages();
                        }
                    }, 500);
                } else {
                    alert('Erro ao enviar arquivo: ' + (data.error || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error('Erro ao enviar arquivo:', error);
                alert('Erro ao enviar arquivo. Tente novamente.');
            } finally {
                this.sendingMessage = false;
            }
        },

        formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        },

        formatMoney(value) {
            return parseFloat(value || 0).toFixed(2).replace('.', ',');
        },

        formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        },

        async loadCustomerProfile() {
            if (!this.selectedConversation || !this.selectedBot) return;
            this.loadingProfile = true;
            try {
                const resp = await fetch(
                    `/api/chat/customer-profile/${this.selectedBot.id}/${this.selectedConversation.telegram_user_id}`
                );
                const data = await resp.json();
                if (data.success) this.customerProfile = data.customer;
            } catch (e) {
                console.error('Erro ao carregar perfil:', e);
            } finally {
                this.loadingProfile = false;
            }
        },
    };
}
</script>
